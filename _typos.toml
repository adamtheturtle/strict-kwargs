# Spell-checking configuration for `typos`.
# https://github.com/crate-ci/typos

[files]
# `crates/strict-kwargs/vendored/typeshed/` is a verbatim third-party copy
# (see its README); never rewrite it. Lockfiles are generated.
extend-exclude = [
  "crates/strict-kwargs/vendored/typeshed/",
  "Cargo.lock",
  "uv.lock",
]

[default.extend-words]
# `ot` is a parameter name in a Python descriptor test fixture
# (`def __get__(self, o, ot=None)`), not a misspelling.
ot = "ot"
