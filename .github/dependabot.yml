---
version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    # Wait before opening update PRs so freshly-published (potentially
    # compromised) releases are not pulled in immediately.
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
