---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-${{ matrix.platform }}

      - name: Docs (warnings are errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --all-features --document-private-items

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

  pre-commit:
    # Runs the explicit prek stages documented in `.pre-commit-config.yaml`.
    # `pre-commit` owns file hygiene and workflow checks; `pre-push` owns
    # `cargo fmt` and `cargo clippy`.
    strategy:
      matrix:
        hook-stage: [pre-commit, pre-push]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-pre-commit

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run prek hooks (${{ matrix.hook-stage }})
        run: uvx prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --show-diff-on-failure --color=always --verbose

  completion-lint:
    needs: [build, audit, pre-commit]
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check job statuses
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          PRE_COMMIT_RESULT: ${{ needs.pre-commit.result }}
        run: |-
          if [ "$BUILD_RESULT" != "success" ] \
            || [ "$AUDIT_RESULT" != "success" ] \
            || [ "$PRE_COMMIT_RESULT" != "success" ]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
