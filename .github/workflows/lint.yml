---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-${{ matrix.platform }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Docs (warnings are errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --all-features --document-private-items

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

  pre-commit:
    # Runs the same prek hooks contributors run locally
    # (see `.pre-commit-config.yaml`) so there is no drift between local
    # and CI — *except* the `cargo-fmt`/`cargo-clippy`/`cargo-test` local
    # hooks, which are skipped here because the `build` matrix job above
    # and `ci.yml` already run the byte-for-byte identical `cargo`
    # commands. Re-running them here meant a third cold clippy compile and
    # a second cold full test build per CI run; skipping keeps coverage
    # of those checks (via the dedicated jobs) with no drift while
    # dropping the Rust/ty toolchain setup this job no longer needs.
    runs-on: ubuntu-latest

    env:
      SKIP: cargo-fmt,cargo-clippy,cargo-test

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run prek hooks (commit stage)
        run: uvx prek run --all-files --hook-stage pre-commit
          --show-diff-on-failure --color=always --verbose

      - name: Run prek hooks (push stage)
        run: uvx prek run --all-files --hook-stage pre-push
          --show-diff-on-failure --color=always --verbose

  completion-lint:
    needs: [build, audit, pre-commit]
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check job statuses
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          PRE_COMMIT_RESULT: ${{ needs.pre-commit.result }}
        run: |-
          if [ "$BUILD_RESULT" != "success" ] \
            || [ "$AUDIT_RESULT" != "success" ] \
            || [ "$PRE_COMMIT_RESULT" != "success" ]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
