---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Docs (warnings are errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features --document-private-items

  pre-commit:
    # Runs the exact same hooks contributors run locally via `prek`
    # (see `.pre-commit-config.yaml`) so there is no drift between local
    # and CI.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run prek hooks (commit stage)
        run: uvx prek run --all-files --hook-stage pre-commit
          --show-diff-on-failure --color=always --verbose

      - name: Run prek hooks (push stage)
        run: uvx prek run --all-files --hook-stage pre-push
          --show-diff-on-failure --color=always --verbose

  completion-lint:
    needs: [build, pre-commit]
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check job statuses
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          PRE_COMMIT_RESULT: ${{ needs.pre-commit.result }}
        run: |-
          if [ "$BUILD_RESULT" != "success" ] \
            || [ "$PRE_COMMIT_RESULT" != "success" ]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
