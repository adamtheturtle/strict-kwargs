---
# Build wheels for an existing tag and publish to PyPI (trusted publishing).
# Use after PyPI trusted publishing is configured, or to retry a failed publish.
name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and publish
        required: true
        default: '2026.5.16'

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    environment: release

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git checkout "$TAG"
          uv run --with maturin maturin build --release --out dist/
          # Bin wheels have no Python package in the wheel library (W007).
          uv run --extra release check-wheel-contents --ignore W007 dist/*.whl

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist/
