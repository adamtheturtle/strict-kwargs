---
name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust nightly (branch coverage + `#[coverage(off)]` need an unstable rustc)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        # Instrumented nightly build — kept on its own key so it never
        # thrashes the (uninstrumented, stable) `test`/`lint` caches.
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install ty (type-inference fallback under test)
        shell: bash
        run: |
          uv tool install ty
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Verify ty is on PATH
        # Fail loudly if ty is missing so the ty-backed tests are actually
        # exercised (rather than skipped) and counted towards coverage.
        run: ty version

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce 100% line + branch coverage
        # Branch coverage needs `--branch` (unstable; nightly above).
        # Collect once, then gate twice off the same profdata. Test
        # modules and documented-unreachable helpers are `#[coverage(off)]`.
        # `cargo-llvm-cov` has `--fail-under-lines` but no
        # `--fail-under-branches`, so the branch threshold is read from the
        # JSON summary and checked with `jq -e` (data via stdin, never
        # interpolated into code).
        shell: bash
        run: |
          cargo llvm-cov --no-report --branch --workspace
          cargo llvm-cov report --branch --fail-under-lines 100
          summary="$(cargo llvm-cov report --branch --json --summary-only)"
          echo "Branch coverage: $(jq -r '.data[0].totals.branches.percent' <<<"$summary")%"
          jq -e '.data[0].totals.branches.percent >= 100' >/dev/null <<<"$summary" \
            || { echo "error: branch coverage is below the required 100%" >&2; exit 1; }

  completion-coverage:
    needs: coverage
    runs-on: ubuntu-latest
    if: always()  # Run even if the coverage job fails
    steps:
      - name: Check coverage job status
        run: |-
          if ! ${{ needs.coverage.result == 'success' }}; then
            echo "Coverage gate failed"
            exit 1
          fi
