---
name: Release

on: workflow_dispatch

jobs:
  build:
    name: Publish a release
    runs-on: ubuntu-latest

    environment: release

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Calver calculate version
        uses: StephaneBour/actions-calver@master
        id: calver
        with:
          date_format: '%Y.%m.%d'
          release: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the changelog underline
        id: changelog_underline
        env:
          RELEASE: ${{ steps.calver.outputs.release }}
        run: |
          underline="$(echo "$RELEASE" | tr -c '\n' '-')"
          echo "underline=${underline}" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        id: update_changelog
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "Next\n----"
          replace: |
            Next
            ----

            ${{ steps.calver.outputs.release }}
            ${{ steps.changelog_underline.outputs.underline }}
          include: CHANGELOG.rst
          regex: false

      - name: Check Update changelog was modified
        env:
          MODIFIED_FILES: ${{ steps.update_changelog.outputs.modifiedFiles }}
        run: |
          if [ "$MODIFIED_FILES" = "0" ]; then
            echo "Error: No files were modified when updating changelog"
            exit 1
          fi

      - name: Set package version
        env:
          NEW_TAG: ${{ steps.calver.outputs.release }}
        run: |
          sed -i.bak "s/^version = .*/version = \"${NEW_TAG}\"/" Cargo.toml
          sed -i.bak "s/^version = .*/version = \"${NEW_TAG}\"/" pyproject.toml
          rm -f Cargo.toml.bak pyproject.toml.bak

      - uses: stefanzweifel/git-auto-commit-action@v7
        id: commit
        with:
          commit_message: Bump CHANGELOG and version for release
          file_pattern: CHANGELOG.rst Cargo.toml pyproject.toml
          skip_dirty_check: true

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.calver.outputs.release }}
          tag_prefix: ''
          commit_sha: ${{ steps.commit.outputs.commit_hash }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        env:
          NEW_TAG: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          git fetch --tags
          git checkout "$NEW_TAG"
          uv run --with maturin maturin build --release --out dist/
          uv run --extra release check-wheel-contents dist/*.whl

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist/
