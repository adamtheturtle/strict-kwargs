---
name: Release

on:
  workflow_dispatch:
    inputs:
      publish_only:
        description: Build and publish an existing tag to PyPI (no version bump)
        type: boolean
        default: false
      tag:
        description: Tag to publish (publish_only only)
        type: string
        default: '2026.5.16'

jobs:
  release:
    name: Publish a release
    if: ${{ !inputs.publish_only }}
    runs-on: ubuntu-latest

    # Specifying an environment is strongly recommended by PyPI.
    # See https://github.com/pypa/gh-action-pypi-publish/tree/release/v1/?tab=readme-ov-file#trusted-publishing.
    environment: release

    permissions:
      # This is needed for PyPI publishing.
      # See https://github.com/pypa/gh-action-pypi-publish/tree/release/v1/?tab=readme-ov-file#trusted-publishing.
      id-token: write
      # This is needed for https://github.com/stefanzweifel/git-auto-commit-action.
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # See
          # https://github.com/stefanzweifel/git-auto-commit-action?tab=readme-ov-file#push-to-protected-branches
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Calver calculate version
        uses: StephaneBour/actions-calver@master
        id: calver
        with:
          date_format: '%Y.%-m.%-d'
          release: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cargo rejects leading zeros (e.g. 2026.05.16). Bump patch if today's tag exists.
      - name: Normalize version for Cargo
        id: version
        env:
          RAW: ${{ steps.calver.outputs.release }}
        run: |
          normalized="$(echo "$RAW" | awk -F. '{
            printf "%s", $1
            for (i=2; i<=NF; i++) printf ".%d", $i+0
            printf "\n"
          }')"
          release="$normalized"
          patch=1
          while git rev-parse "$release" >/dev/null 2>&1; do
            release="${normalized}-post.${patch}"
            patch=$((patch + 1))
          done
          echo "release=${release}" >> "$GITHUB_OUTPUT"

      - name: Get the changelog underline
        id: changelog_underline
        env:
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          underline="$(echo "$RELEASE" | tr -c '\n' '-')"
          echo "underline=${underline}" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        id: update_changelog
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "Next\n----"
          replace: |
            Next
            ----

            ${{ steps.version.outputs.release }}
            ${{ steps.changelog_underline.outputs.underline }}
          include: CHANGELOG.rst
          regex: false

      - name: Check Update changelog was modified
        env:
          MODIFIED_FILES: ${{ steps.update_changelog.outputs.modifiedFiles }}
        run: |
          if [ "$MODIFIED_FILES" = "0" ]; then
            echo "Error: No files were modified when updating changelog"
            exit 1
          fi

      - name: Set package version
        env:
          NEW_TAG: ${{ steps.version.outputs.release }}
        run: |
          sed -i.bak "s/^version = .*/version = \"${NEW_TAG}\"/" Cargo.toml
          sed -i.bak "s/^version = .*/version = \"${NEW_TAG}\"/" pyproject.toml
          rm -f Cargo.toml.bak pyproject.toml.bak

      - uses: stefanzweifel/git-auto-commit-action@v7
        id: commit
        with:
          commit_message: Bump CHANGELOG and version for release
          file_pattern: CHANGELOG.rst Cargo.toml pyproject.toml
          skip_dirty_check: true

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.version.outputs.release }}
          tag_prefix: ''
          commit_sha: ${{ steps.commit.outputs.commit_hash }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        env:
          NEW_TAG: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          git fetch --tags
          git checkout "$NEW_TAG"
          uv run --with maturin maturin build --release --out dist/
          # Bin wheels have no Python package in the wheel library (W007).
          uv run --extra release check-wheel-contents --ignore W007 dist/*.whl

      # We use PyPI trusted publishing rather than a PyPI API token.
      # See https://github.com/pypa/gh-action-pypi-publish/tree/release/v1/?tab=readme-ov-file#trusted-publishing.
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist/

  publish_only:
    name: Publish existing tag to PyPI
    if: ${{ inputs.publish_only }}
    runs-on: ubuntu-latest

    environment: release

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git checkout "$TAG"
          uv run --with maturin maturin build --release --out dist/
          uv run --extra release check-wheel-contents --ignore W007 dist/*.whl

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist/
