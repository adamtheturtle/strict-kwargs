---
name: Release

on:
  workflow_dispatch:
    inputs:
      publish_only:
        description: Build and publish an existing tag to PyPI (no version bump)
        type: boolean
        default: false
      tag:
        description: Tag to publish (publish_only only)
        type: string
        default: '2026.5.16'

jobs:
  release:
    name: Bump version and tag
    if: ${{ !inputs.publish_only }}
    runs-on: ubuntu-latest

    environment: release

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          # See
          # https://github.com/stefanzweifel/git-auto-commit-action?tab=readme-ov-file#push-to-protected-branches
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      # Calver without Cargo-safe patch bumps (use -post.N when re-releasing same day).
      - name: Compute release version
        id: version
        run: |
          normalized=$(date -u +%Y.%-m.%-d)
          release="$normalized"
          patch=1
          while git rev-parse "refs/tags/${release}" >/dev/null 2>&1; do
            release="${normalized}-post.${patch}"
            patch=$((patch + 1))
          done
          echo "release=${release}" >> "$GITHUB_OUTPUT"

      - name: Get the changelog underline
        id: changelog_underline
        env:
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          underline="$(echo "$RELEASE" | tr -c '\n' '-')"
          echo "underline=${underline}" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        id: update_changelog
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "Next\n----"
          replace: |
            Next
            ----

            ${{ steps.version.outputs.release }}
            ${{ steps.changelog_underline.outputs.underline }}
          include: CHANGELOG.rst
          regex: false

      - name: Check Update changelog was modified
        env:
          MODIFIED_FILES: ${{ steps.update_changelog.outputs.modifiedFiles }}
        run: |
          if [ "$MODIFIED_FILES" = "0" ]; then
            echo "Error: No files were modified when updating changelog"
            exit 1
          fi

      - name: Set package version
        env:
          NEW_TAG: ${{ steps.version.outputs.release }}
        run: |
          sed -i.bak "s/^version = .*/version = \"${NEW_TAG}\"/" Cargo.toml
          sed -i.bak "s/^version = .*/version = \"${NEW_TAG}\"/" pyproject.toml
          rm -f Cargo.toml.bak pyproject.toml.bak

      - uses: stefanzweifel/git-auto-commit-action@v7
        id: commit
        with:
          commit_message: Bump CHANGELOG and version for release
          file_pattern: CHANGELOG.rst Cargo.toml pyproject.toml
          skip_dirty_check: true

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.version.outputs.release }}
          tag_prefix: ''
          commit_sha: ${{ steps.commit.outputs.commit_hash }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: release
    if: ${{ !inputs.publish_only }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        shell: bash
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          git checkout "$TAG"
          uvx maturin build --release --out dist/
          ls -la dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-existing-tag:
    name: Build wheels (${{ matrix.os }})
    if: ${{ inputs.publish_only }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git checkout "$TAG"
          uvx maturin build --release --out dist/
          ls -la dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels-existing-tag
    if: ${{ inputs.publish_only }}
    runs-on: ubuntu-latest

    environment: release

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Check wheels
        run: |
          ls -la dist/
          uv run --extra release check-wheel-contents --ignore W007 dist/*.whl

      # We use PyPI trusted publishing rather than a PyPI API token.
      # See https://github.com/pypa/gh-action-pypi-publish/tree/release/v1/?tab=readme-ov-file#trusted-publishing.
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist/
          skip-existing: true

  publish-pypi-release:
    name: Publish to PyPI
    needs: build-wheels
    if: ${{ !inputs.publish_only }}
    runs-on: ubuntu-latest

    environment: release

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Check wheels
        run: |
          ls -la dist/
          uv run --extra release check-wheel-contents --ignore W007 dist/*.whl

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          packages-dir: dist/
          skip-existing: true
