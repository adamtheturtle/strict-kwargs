---
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install ty (type-inference fallback under test)
        shell: bash
        run: |
          uv tool install ty
          echo "$(uv tool dir --bin)" >> "$GITHUB_PATH"

      - name: Verify ty is on PATH
        # Fail loudly if ty is missing so the ty-backed tests are actually
        # exercised on every platform (incl. Windows) rather than skipped.
        shell: bash
        run: ty version

      - name: Run tests
        run: cargo test --verbose

  completion-ci:
    needs: build
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
