---
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *
  # Lets CodSpeed trigger backtest runs to seed an initial benchmark
  # baseline (issue #30).
  workflow_dispatch:
    inputs:
      include-cpython-benchmark:
        description: Include the opt-in CPython CodSpeed benchmark
        required: false
        type: boolean
        default: false

permissions: {}

# A new push to a PR cancels superseded in-progress runs instead of
# queueing behind them. `main` pushes use the unique run id so post-merge
# runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.platform }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install ty (type-inference fallback under test)
        shell: bash
        run: |
          uv tool install ty
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Verify ty is on PATH
        # Fail loudly if ty is missing so the ty-backed tests are actually
        # exercised on every platform (incl. Windows) rather than skipped.
        shell: bash
        run: ty version

      - name: Run tests
        run: cargo test --locked --verbose

  benchmarks:
    # Continuous benchmarking (issue #30). Pull requests compile the benchmark
    # target as a smoke test; CodSpeed uploads run only on non-PR events so an
    # external comparison cannot block unrelated PRs while still keeping the
    # scheduled/main-branch signal. `ty` is now a hard requirement, so it must
    # be installed for `check_paths`/`fix_paths` to run at all. Its presence is
    # probed once per process (memoized in `require_ty_present`), so the
    # benchmarks still measure the built-in resolver hot paths — the fixtures
    # are fully resolvable by the built-in resolver, so `ty_pending` stays
    # empty and the `ty server` subprocess is never started.
    #
    # This is a public repository, so the upload is tokenless: CodSpeed v4
    # authenticates via the GitHub OIDC token (`id-token: write` below), so
    # no `CODSPEED_TOKEN` secret is required and PRs from forks are still
    # supported per CodSpeed's docs. The job is unconditional — `cargo
    # codspeed build` doubles as a compile smoke test for the benchmark
    # target, so a broken benchmark is caught regardless.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OpenID Connect authentication with CodSpeed (tokenless upload).
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: codspeed

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install ty (required backend; probed once per process)
        shell: bash
        run: |
          uv tool install ty
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Verify ty is on PATH
        shell: bash
        run: ty version

      - name: Check Cargo.lock freshness
        run: cargo metadata --locked --format-version 1

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build the benchmark target
        run: cargo codspeed build

      - name: Clone pinned CPython benchmark checkout
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.include-cpython-benchmark }}
        shell: bash
        env:
          CPYTHON_REF: 8b31d08e62b9714cf8dd1d8b19afa5ecbad2414a
          EXTERNAL_DIR: ${{ runner.temp }}/external
        run: |
          set -euo pipefail
          dest="$EXTERNAL_DIR/cpython"
          mkdir -p "$dest"
          git -C "$dest" init --quiet
          git -C "$dest" remote add origin https://github.com/python/cpython.git
          git -C "$dest" fetch --depth=1 origin "$CPYTHON_REF"
          git -C "$dest" checkout --detach --quiet FETCH_HEAD
          git -C "$dest" rev-parse HEAD

      - name: Run the benchmarks
        if: ${{ github.event_name != 'pull_request' }}
        uses: CodSpeedHQ/action@v4
        env:
          STRICT_KWARGS_BENCH_CPYTHON_CHECKOUT: ${{ github.event_name == 'workflow_dispatch' && inputs.include-cpython-benchmark && format('{0}/external/cpython', runner.temp) || '' }}
        with:
          mode: simulation
          run: cargo codspeed run

  cpython-completeness:
    # Differential completeness test against a pinned CPython checkout (issue
    # #192). Asserts the full-tree scan EXACTLY equals a committed golden
    # baseline (within stable real-library packages): no fewer violations (a
    # dropped real one, the issue #191 failure mode) and no more (a spurious
    # one). Exact equality is possible because the ty fallback is deterministic
    # (it warms up a full type-check and runs ty in the project root, issue
    # #198).
    #
    # This intentionally runs on every push and pull request, not just on a
    # schedule: correctness of the ty fallback is core to the tool, so it gates
    # merges. The whole tree is scanned (exercising the single-session-at-scale
    # path) even though only the chosen packages are compared.
    runs-on: ubuntu-latest
    # One deterministic scan. The warm-up type-checks the whole tree against the
    # pinned interpreter, which can take ~20 minutes; allow generous headroom.
    timeout-minutes: 60
    env:
      # Keep in sync with `CPYTHON_REF` in full-dry-runs.yml and the pinned ref
      # in scripts/regenerate-cpython-golden.sh.
      CPYTHON_REF: 8b31d08e62b9714cf8dd1d8b19afa5ecbad2414a
      # The golden baseline depends on ty's resolution output, so this job pins
      # ty to the version the baseline was generated with — unlike the other
      # jobs, which deliberately track the latest ty (issue #189). A ty bump
      # here must be paired with regenerating the baseline; keep this in sync
      # with `TY_VERSION` in scripts/regenerate-cpython-golden.sh and the
      # `Generated with ty` line in the golden file.
      TY_VERSION: 0.0.42
      # ty resolves the stdlib against this pinned interpreter (passed as
      # `--python`), so the result is identical and memory is bounded
      # regardless of the runner's own (heavy) preinstalled Python. Keep in
      # sync with `PYTHON_VERSION` in scripts/regenerate-cpython-golden.sh;
      # bumping it means regenerating the baseline.
      PYTHON_VERSION: 3.13.13

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cpython-completeness

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install ty (pinned; the baseline is tied to this version)
        shell: bash
        run: |
          uv tool install "ty==$TY_VERSION"
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Verify ty is on PATH
        shell: bash
        run: ty version

      - name: Install the pinned interpreter ty resolves against
        shell: bash
        run: |
          set -euo pipefail
          uv python install "$PYTHON_VERSION"
          echo "STRICT_KWARGS_CPYTHON_PYTHON=$(uv python find "$PYTHON_VERSION")" >> "$GITHUB_ENV"

      - name: Clone pinned CPython checkout
        shell: bash
        env:
          EXTERNAL_DIR: ${{ runner.temp }}/external
        run: |
          set -euo pipefail
          dest="$EXTERNAL_DIR/cpython"
          mkdir -p "$dest"
          git -C "$dest" init --quiet
          git -C "$dest" remote add origin https://github.com/python/cpython.git
          git -C "$dest" fetch --depth=1 origin "$CPYTHON_REF"
          git -C "$dest" checkout --detach --quiet FETCH_HEAD
          git -C "$dest" rev-parse HEAD

      - name: Run the completeness test
        shell: bash
        env:
          STRICT_KWARGS_CPYTHON_CHECKOUT: ${{ runner.temp }}/external/cpython
        # Release build: the baseline was captured release-mode, and the
        # warm-up full type-check would be slow in a debug build.
        run: cargo test --release --locked --test cpython_completeness -- --nocapture

  completion-ci:
    needs: [build, cpython-completeness]
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
          if ! ${{ needs.cpython-completeness.result == 'success' }}; then
            echo "CPython completeness test failed"
            exit 1
          fi
