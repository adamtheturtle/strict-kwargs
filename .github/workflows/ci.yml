---
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 1:00 every day
    - cron: 0 1 * * *

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install ty (type-inference fallback under test)
        shell: bash
        run: |
          uv tool install ty
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Verify ty is on PATH
        # Fail loudly if ty is missing so the ty-backed tests are actually
        # exercised on every platform (incl. Windows) rather than skipped.
        shell: bash
        run: ty version

      - name: Run tests
        run: cargo test --verbose

  benchmarks:
    # Continuous benchmarking (issue #30). Non-gating: it reports an
    # instruction-count delta against `main` on every PR but does not fail
    # the build, so a baseline can be established before any threshold is
    # enforced. `ty` is intentionally not installed here — CodSpeed measures
    # instructions of this process, so the optional ty subprocess fallback
    # would not be measured anyway, and the fixtures are fully resolvable by
    # the built-in resolver.
    #
    # The measured upload runs only when `CODSPEED_TOKEN` is configured (a
    # repo secret). Without it the CodSpeed API rejects the upload with a
    # 401, so the step is skipped rather than failing the build — fork PRs
    # and repos that have not yet linked CodSpeed stay green. `cargo
    # codspeed build` still runs unconditionally as a compile smoke test, so
    # a broken benchmark is caught regardless. To enable measurement, add a
    # `CODSPEED_TOKEN` secret from the CodSpeed dashboard for this repo.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Job-level env may reference secrets; step `if` may reference `env`.
    # This is the supported way to gate a step on a secret's presence
    # (secrets are not usable in `if:` directly).
    env:
      CODSPEED_TOKEN: ${{ secrets.CODSPEED_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build the benchmark target
        run: cargo codspeed build

      - name: Run the benchmarks
        if: env.CODSPEED_TOKEN != ''
        uses: CodSpeedHQ/action@v3
        with:
          run: cargo codspeed run
          token: ${{ env.CODSPEED_TOKEN }}

  completion-ci:
    needs: build
    runs-on: ubuntu-latest
    if: always()  # Run even if one matrix job fails
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
